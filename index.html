<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 추천 종목 리스트 생성기</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #0c0f1a 0%, #1c2538 100%);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .infographic {
      width: 100%;
      max-width: 820px;
      background: #0a0f1f;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(234, 88, 12, 0.3);
    }

    /* 상단 헤더 스타일 */
    .header {
      background: linear-gradient(90deg, #111827, #1f2937);
      padding: 30px 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #f59e0b;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      color: white;
    }

    .title-area {
      text-align: right;
    }

    .main-title {
      font-size: 28px;
      font-weight: 900;
      color: #f8fafc;
      margin: 0;
      line-height: 1.2;
    }

    /* 테이블 스타일 */
    .content {
      padding: 30px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    th {
      background: #1e2937;
      color: #f59e0b;
      font-size: 18px;
      font-weight: 700;
      padding: 15px;
      border-bottom: 2px solid #f59e0b;
    }

    td {
      background: #111827;
      color: #e2e8f0;
      padding: 15px;
      font-size: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      outline: none;
      transition: background 0.2s;
    }

    /* 행(Row)별 교차 색상 */
    tr:nth-child(even) td {
      background: #161e2d;
    }

    td:focus {
      background: rgba(245, 158, 11, 0.1) !important;
      color: #fcd34d;
    }

    /* 수익률 열 강조 */
    td:last-child {
      font-weight: 700;
      color: #fbbf24;
    }

    .download-btn {
      margin-top: 40px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: #1e2937;
      border: none;
      padding: 18px 60px;
      font-size: 19px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(245, 158, 11, 0.5);
      transition: all 0.2s;
    }

    .download-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 45px rgba(245, 158, 11, 0.6);
    }
  </style>
</head>
<body>

  <div class="infographic" id="capture-area">
    <div class="header">
      <div class="logo">BlackRock®</div>
      <div class="title-area">
        <h1 class="main-title">블랙록 추천 종목 리스트</h1>
      </div>
    </div>

    <div class="content">
      <table>
        <thead>
          <tr>
            <th width="20%">날짜</th>
            <th width="30%">종목</th>
            <th width="15%">매수</th>
            <th width="15%">매도</th>
            <th width="20%">수익률</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <script>
            const body = document.getElementById('tableBody');
            for(let i=0; i<10; i++) {
              const tr = document.createElement('tr');
              tr.innerHTML = `
                <td contenteditable="true">00.00</td>
                <td contenteditable="true">종목명 입력</td>
                <td contenteditable="true">0,000</td>
                <td contenteditable="true">0,000</td>
                <td contenteditable="true">+0.0%</td>
              `;
              body.appendChild(tr);
            }
          </script>
        </tbody>
      </table>
    </div>
  </div>

  <button class="download-btn" id="saveBtn">
    📥 리스트 이미지로 저장하기
  </button>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // 1. 엔터 입력 방지 및 포커스 관리
    document.addEventListener('keydown', (e) => {
      if (e.target.getAttribute('contenteditable') === 'true' && e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
      }
    });

    // 2. 이미지 다운로드 로직
    async function downloadImage() {
      const btn = document.getElementById('saveBtn');
      const area = document.getElementById('capture-area');
      
      btn.innerText = "⏳ 고화질 변환 중...";
      btn.style.opacity = "0.7";

      try {
        await document.fonts.ready;
        
        setTimeout(() => {
          html2canvas(area, {
            scale: 3, 
            useCORS: true,
            backgroundColor: '#0a0f1f',
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = `BlackRock_List_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            btn.innerText = "📥 리스트 이미지로 저장하기";
            btn.style.opacity = "1";
          });
        }, 150);
      } catch (err) {
        alert("저장 중 오류가 발생했습니다.");
        btn.innerText = "📥 리스트 이미지로 저장하기";
      }
    }

    document.getElementById('saveBtn').addEventListener('click', downloadImage);
  </script>
</body>
</html>
