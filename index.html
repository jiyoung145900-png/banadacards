<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 리스트 생성기 (최적화 버전)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 30px;
      background: linear-gradient(135deg, #0c0f1a 0%, #1c2538 100%);
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .infographic {
      width: 100%;
      max-width: 820px;
      background: #0a0f1f;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(234, 88, 12, 0.3);
    }

    .header {
      background: linear-gradient(90deg, #111827, #1f2937);
      padding: 30px 45px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #f59e0b;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      color: white;
    }

    .main-title {
      font-size: 28px;
      font-weight: 900;
      color: #f8fafc;
      margin: 0;
    }

    .content { padding: 30px; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th {
      background: #1e2937;
      color: #f59e0b;
      padding: 15px;
      border-bottom: 2px solid #f59e0b;
    }

    td {
      background: #111827;
      color: #e2e8f0;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      outline: none;
      position: relative;
    }

    tr:nth-child(even) td { background: #161e2d; }

    /* 핵심: Placeholder 스타일 (흐리게 표시) */
    [contenteditable]:empty::before {
      content: attr(data-placeholder);
      color: rgba(255, 255, 255, 0.15); /* 매우 흐리게 */
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      width: 100%;
      display: block;
    }

    /* 입력 중이거나 내용이 있으면 숨김 */
    [contenteditable]:focus::before {
      display: none;
    }

    /* 이미지 캡처 시 가이드 문구 강제 제거용 클래스 */
    .hide-placeholder [contenteditable]:empty::before {
      display: none !important;
    }

    .download-btn {
      margin-top: 40px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: #1e2937;
      border: none;
      padding: 18px 60px;
      font-size: 19px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 12px 40px rgba(245, 158, 11, 0.5);
    }
  </style>
</head>
<body>

  <div class="infographic" id="capture-area">
    <div class="header">
      <div class="logo">BlackRock®</div>
      <div class="main-title">블랙록 추천 종목 리스트</div>
    </div>

    <div class="content">
      <table>
        <thead>
          <tr>
            <th width="20%">날짜</th>
            <th width="30%">종목</th>
            <th width="15%">매수</th>
            <th width="15%">매도</th>
            <th width="20%">수익률</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>

  <button class="download-btn" id="saveBtn">📥 리스트 이미지로 저장하기</button>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // 행 자동 생성 및 placeholder 설정
    const tableBody = document.getElementById('tableBody');
    const placeholders = ["00.00", "종목명 입력", "0,000", "0,000", "+0.0%"];
    
    for(let i=0; i<10; i++) {
      const tr = document.createElement('tr');
      placeholders.forEach(ph => {
        const td = document.createElement('td');
        td.contentEditable = "true";
        td.setAttribute('data-placeholder', ph);
        tr.appendChild(td);
      });
      tableBody.appendChild(tr);
    }

    // 엔터 입력 방지
    document.addEventListener('keydown', (e) => {
      if (e.target.contentEditable === 'true' && e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
      }
    });

    // 다운로드 로직
    async function downloadImage() {
      const btn = document.getElementById('saveBtn');
      const area = document.getElementById('capture-area');
      
      btn.innerText = "⏳ 처리 중...";
      
      // 1. 캡처 직전 placeholder 숨기기 모드 활성화
      area.classList.add('hide-placeholder');

      try {
        await document.fonts.ready;
        
        setTimeout(() => {
          html2canvas(area, {
            scale: 3,
            backgroundColor: '#0a0f1f',
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = `BlackRock_List_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // 2. 캡처 완료 후 다시 원래대로 복구
            area.classList.remove('hide-placeholder');
            btn.innerText = "📥 리스트 이미지로 저장하기";
          });
        }, 100);
      } catch (err) {
        area.classList.remove('hide-placeholder');
        btn.innerText = "📥 리스트 이미지로 저장하기";
      }
    }

    document.getElementById('saveBtn').addEventListener('click', downloadImage);
  </script>
</body>
</html>
